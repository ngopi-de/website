baseURL: https://ngopi.de/
languageCode: de-de
title: Ngopi. Wir Lieben es!

enableEmoji: true

module:
  # uncomment line below for local development of module
  # workspace: hugo.work
  imports:
    path: github.com/StefMa/hugo-fresh


googleAnalytics: # Put in your tracking code without quotes like this: UA-XXX for universal tracking or G-XXX analytics v4 tracking
# Disables warnings
disableKinds:
- taxonomy
markup:
  goldmark:
    renderer:
      unsafe: true # Allows you to write raw html in your md files

params:
  # Open graph allows easy social sharing. If you don't want it you can set it to false or just delete the variable
  openGraph: true
  # Used as meta data; describe your site to make Google Bots happy
  description: Ein Gemeinschaftsprojekt befreundeter Informatiker.
  # Preloader ensures images are loaded before displaying to the user. If you don't want it uncomment to set it to false
  # preloader: false
  navbarlogo:
  # Logo (from static/images/logos/___)
    image: house.svg
    link: /
    # Default width/height. Uncomment if you need to change
    # width: 112
    # height: 28
  font:
    name: "Open Sans"
    sizes: [400,600]
  hero:
    # Main hero title
    title: Wir lieben es!
    # Hero subtitle (optional)
    subtitle: |
      Genau wie die meisten Informatiker lieben auch wir den frischen Geruch von gemahlenem Kaffee und den einzigartigen Geschmack
      einer guten Bohne. Kurz gesagt, wir lieben es Kaffee zu trinken! Und so heißt es dann auf indonesisch: Ngopi - Kaffee trinken
    # Button text
    buttontext: Worum geht's?
    # Where the main hero button links to
    buttonlink: "project"
    # Hero image (from static/images/___)
    image: coffee_cup.svg
    # Footer logos (from static/images/logos/clients/*.svg)
    # urls are optional
    #clientlogos:
    #- logo: systek
    #  url: https://google.com
    #- logo: tribe
    #  url: https://stefma.github.io/hugo-fresh/
    #- logo: kromo
    #  url: https://github.com/StefMa/hugo-fresh
    #- logo: infinite
    #  url: https://hugo-fresh.vercel.app/
    #- logo: gutwork
    #  url: https://bulma.io/
  # Customizable navbar. For a dropdown, add a "sublinks" list.
  navbar:
  - title: Über uns
    url: /project
  - title: Credits
    url: /credits
  - title: Impressum
    url: /imprint
  footer:
    # Logo (from static/images/logos/___)
    logo: ngopi_dark.svg
    # Social Media Title
    socialmediatitle: Follow Us
    # Social media links (GitHub, Twitter, etc.). All are optional.
    socialmedia:
    - link: https://github.com/ngopi-de/
      # Icons are from Font Awesome
      icon: github
    bulmalogo: true
    quicklinks:
      column1:
        title: "Unsere Bohnen"
        links:
        - text: Peet's Homepage
          link: https://peet.ngopi.de/
        - text: Kai's Homepage
          link: http://kohennigs.de/
      column2:
        title: "Über uns"
        links:
        - text: Unser Projekt
          link: /project
        - text: Credits
          link: /credits
        - text: Impressum
          link: /imprint
